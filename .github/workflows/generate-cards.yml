name: Generate YuGiOh Cards

on:
    schedule:
        - cron: "0 4 * * 4"
    push:
        branches:
            - main

jobs:
    generate-cards:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Install ZSH and other dependencies
              run: sudo apt-get update && sudo apt-get install -y zsh wget curl unzip jq imagemagick dotnet-sdk-8.0 tar xz-utils

            - name: Make shell scripts executable
              run: |
                  chmod +x ./YuGiOh-Cards-Maker.sh
                  chmod +x ./script/process_yugioh_cards.sh

            - name: Run YuGiOh-Cards-Maker script
              run: |
                  zsh ./YuGiOh-Cards-Maker.sh
              env:
                  GITHUB_ACTIONS: true

            - name: Create directory for tarballs
              run: mkdir -p ./tarballs

            - name: Pack all JPG files into a single tarball
              run: |
                  jpg_files=($(find ./figure -name "*.jpg" -type f | sort))
                  total_files=${#jpg_files[@]}
                  if [ $total_files -eq 0 ]; then
                    echo "No JPG files found in figure directory"
                    exit 1
                  fi

                  tar -cJf "./tarballs/cards.tar.xz" -C ./figure .
                  echo "Created single tarball cards.tar.xz with all ${total_files} JPG files"

            - name: Delete existing release
              uses: dev-drprasad/delete-tag-and-release@v0.2.1
              with:
                  tag_name: latest
                  delete_release: true
                  repo: ${{ github.repository }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: true

            - name: Create/Update release
              id: create_release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: latest
                  name: Latest Cards
                  body: "自动生成的卡片"
                  files: ./tarballs/cards.tar.xz
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
